<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="image/favicon.ico" type="image/x-icon">
    <title>MuntiCare Auth</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        /* Layout & Animation */
        .transition-section {
            transition: transform 0.6s ease-in-out;
        }

        .form-content {
            transition: opacity 0.3s ease-in-out;
        }

        .form-content.fade-out {
            opacity: 0;
        }

        .form-content.fade-in {
            opacity: 1;
        }

        .slide-active #formSection {
            transform: translateX(33.33%);
        }

        .slide-active #infoPanel {
            transform: translateX(-300%);
        }

        /* Auth Wrapper */
        #authWrapper {
            position: relative;
        }

        /* Toggle Button */
        #toggleBtn {
            z-index: 10;
            transition: all 0.6s ease-in-out;
        }

        .toggle-btn-left {
            left: 0;
            transform: translateY(-50%) translateX(-50%);
        }

        .toggle-btn-right {
            left: 100%;
            transform: translateY(-50%) translateX(-50%);
        }

        #toggleBtn:hover {
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        /* Form Loading State */
        .form-loading {
            pointer-events: none;
        }

        /* Role Selection Buttons (anchors styled like buttons) */
        .role-btn,
        .register-role-btn {
            flex: 1;
            font-size: 12px;
            transition: all 0.18s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: .25rem .55rem;
            gap: .35rem;
        }

        .role-btn:hover,
        .register-role-btn:hover {
            transform: scale(1.04);
        }

        .role-btn.active,
        .register-role-btn.active {
            background-color: #1CDB88;
            color: white !important;
            border-color: #1CDB88 !important;
        }
    </style>
</head>
<body>
    <div class="d-flex min-vh-100 position-relative overflow-hidden" id="authWrapper">
        <!-- Left Section (Forms) -->
        <div class="col-12 col-lg-9 d-flex flex-column justify-content-center align-items-center bg-white px-4 transition-section" id="formSection">
            <!-- Header -->
            <div class="text-center mb-3">
                <img src="image/MuntiCare Logo.png" alt="MuntiCare Logo" style="width: 50px; height: 50px;">
                <h6 class="fw-bold mt-2 mb-0">MuntiCare</h6>
                <small class="text-muted" style="font-size: 11px;">Healthcare System</small>
            </div>

            <!-- Login Form -->
            <form class="w-100 form-content" style="max-width: 320px;" id="loginForm">
                <h5 class="fw-bold mb-3 text-center">Sign In</h5>
                
                <!-- Role Selection -->
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Select Role</label>
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="admin/overview.html" role="button" class="btn btn-sm btn-outline-success role-btn" data-role="admin" title="Admin">
                            <i class="bi bi-shield-lock"></i><span class="ms-1 d-none d-sm-inline">Admin</span>
                        </a>
                        <a href="#" role="button" class="btn btn-sm btn-outline-success role-btn" data-role="healthcare" title="Healthcare">
                            <i class="bi bi-hospital"></i><span class="ms-1 d-none d-sm-inline">Health</span>
                        </a>
                        <a href="#" role="button" class="btn btn-sm btn-outline-success role-btn" data-role="patient" title="Patient">
                            <i class="bi bi-person-heart"></i><span class="ms-1 d-none d-sm-inline">Patient</span>
                        </a>
                    </div>
                    <input type="hidden">
                </div>
                
                <div class="mb-2">
                    <label for="email" class="form-label fw-semibold small">Email Address</label>
                    <input id="email" type="email" placeholder="Email Address" class="form-control form-control-sm" required>
                </div>
                
                <div class="mb-2">
                    <label for="password" class="form-label fw-semibold small">Password</label>
                    <input id="password" type="password" placeholder="Password" class="form-control form-control-sm" required>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="text-decoration-none small">Forgot?</a>
                </div>
                
                <p class="small text-muted mb-2">By logging in, I agree to the Terms & Privacy Policy</p>
                <button type="submit" class="btn btn-sm w-100 text-white fw-semibold" style="background-color: #1CDB88;">Submit</button>
            </form>

            <!-- Registration Form -->
            <form class="w-100 form-content d-none" style="max-width: 320px;" id="registerForm">
                <h5 class="fw-bold mb-3 text-center">Sign Up</h5>
                
                <!-- Role Selection -->
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Select Role</label>
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="#" role="button" class="btn btn-sm btn-outline-success register-role-btn" data-role="healthcare" title="Healthcare">
                            <i class="bi bi-hospital"></i><span class="ms-1 d-none d-sm-inline">Health</span>
                        </a>
                        <a href="#" role="button" class="btn btn-sm btn-outline-success register-role-btn" data-role="patient" title="Patient">
                            <i class="bi bi-person-heart"></i><span class="ms-1 d-none d-sm-inline">Patient</span>
                        </a>
                    </div>
                    <input type="hidden" id="registerSelectedRole" required>
                </div>
                
                <div class="mb-2">
                    <label class="form-label fw-semibold small">Full Name</label>
                    <input type="text" class="form-control form-control-sm" placeholder="Your Name" required>
                </div>
                
                <div class="mb-2">
                    <label class="form-label fw-semibold small">Email Address</label>
                    <input type="email" class="form-control form-control-sm" placeholder="Email Address" required>
                </div>
                
                <div class="mb-2">
                    <label class="form-label fw-semibold small">Password</label>
                    <input type="password" class="form-control form-control-sm" placeholder="Password" minlength="8" required>
                </div>
                
                <div class="mb-2">
                    <label class="form-label fw-semibold small">Confirm Password</label>
                    <input type="password" class="form-control form-control-sm" placeholder="Confirm Password" minlength="8" required>
                </div>
                
                <button type="submit" class="btn btn-sm w-100 text-white fw-semibold" style="background-color: #1CDB88;" id="btnRegister">
                    Register
                </button>
            </form>
        </div>

        <!-- Right Section (Info Panel) -->
        <div class="col-3 d-none d-lg-flex flex-column justify-content-center align-items-center text-center text-white transition-section position-relative"
            id="infoPanel" style="background: linear-gradient(#1CDB88, #f8f9fa);">
            <h2 class="fw-bold mb-2" id="panelTitle">Sign In</h2>
            <div class="underline" style="width: 60px; height: 3px; background-color: white;"></div>
            
            <button type="button" id="toggleBtn"
                    class="btn position-absolute d-flex align-items-center justify-content-center toggle-btn-left"
                    style="top: 50%; width: 50px; height: 50px; border-radius: 50%; background-color: white; color: #1CDB88; font-size: 20px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border: 2px solid #1CDB88;">
                <i class="bi bi-arrow-left" id="toggleIcon"></i>
            </button>
        </div>
    </div>

    <!-- Axios & SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // DOM Elements
            const wrapper = document.getElementById("authWrapper");
            const toggleBtn = document.getElementById("toggleBtn");
            const toggleIcon = document.getElementById("toggleIcon");
            const loginForm = document.getElementById("loginForm");
            const registerForm = document.getElementById("registerForm");
            const panelTitle = document.getElementById("panelTitle");
            const btnRegister = document.getElementById("btnRegister");

            // State Variables
            let isLogin = true;
            let isAnimating = false;

            /**
             * Toggle between Login and Register forms
             */
            toggleBtn.addEventListener("click", function() {
                if (isAnimating) return;
                isAnimating = true;

                wrapper.classList.toggle("slide-active");

                // Update button position
                if (isLogin) {
                    toggleBtn.classList.remove("toggle-btn-left");
                    toggleBtn.classList.add("toggle-btn-right");
                } else {
                    toggleBtn.classList.remove("toggle-btn-right");
                    toggleBtn.classList.add("toggle-btn-left");
                }

                // Fade out current form
                const currentForm = isLogin ? loginForm : registerForm;
                currentForm.classList.add("fade-out", "form-loading");

                setTimeout(() => {
                    currentForm.classList.add("d-none");
                    currentForm.classList.remove("fade-out", "form-loading");

                    const nextForm = isLogin ? registerForm : loginForm;
                    nextForm.classList.remove("d-none");
                    nextForm.classList.add("fade-out");

                    setTimeout(() => {
                        nextForm.classList.remove("fade-out");
                        nextForm.classList.add("fade-in");
                    }, 50);

                    // Update panel title and icon
                    panelTitle.textContent = isLogin ? "Sign Up" : "Sign In";
                    toggleIcon.classList.replace(
                        isLogin ? "bi-arrow-left" : "bi-arrow-right",
                        isLogin ? "bi-arrow-right" : "bi-arrow-left"
                    );

                    isLogin = !isLogin;
                    setTimeout(() => {
                        isAnimating = false;
                    }, 300);
                }, 300);
            });

            /**
            * Handle Role Selection
            */
            const roleButtons = document.querySelectorAll(".role-btn");
            const selectedRoleInput = document.getElementById("selectedRole");

            roleButtons.forEach(btn => {
                btn.addEventListener("click", function(e) {
                    const role = this.dataset.role;
                    
                    // If admin role, allow navigation immediately
                    if (role === 'admin') {
                        return; // Allow default link behavior
                    }
                    
                    // For other roles, prevent navigation and just select
                    e.preventDefault();
                    
                    // Remove active class from all buttons
                    roleButtons.forEach(b => b.classList.remove("active"));
                    
                    // Add active class to clicked button
                    this.classList.add("active");
                    
                    // Store selected role
                    selectedRoleInput.value = this.dataset.role;
                });
            });

            /**
             * Handle Registration Role Selection
             */
            const registerRoleButtons = document.querySelectorAll(".register-role-btn");
            const registerSelectedRoleInput = document.getElementById("registerSelectedRole");

            registerRoleButtons.forEach(btn => {
                btn.addEventListener("click", function(e) {
                    e.preventDefault();
                    
                    // Remove active class from all buttons
                    registerRoleButtons.forEach(b => b.classList.remove("active"));
                    
                    // Add active class to clicked button
                    this.classList.add("active");
                    
                    // Store selected role
                    registerSelectedRoleInput.value = this.dataset.role;
                });
            });

            /**
             * Handle Login Form Submission
             */
            loginForm.addEventListener("submit", function(e) {
                e.preventDefault();
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;
                const role = document.getElementById("selectedRole").value;

                // Validate role selection
                if (!role) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Please select a role',
                        text: 'Admin, Healthcare, or Patient'
                    });
                    return;
                }

                // Replace '/api/login' with your actual API endpoint
                axios.post('/api/login', { email, password, role })
                    .then(res => {
                        const user = res.data.user;
                        Swal.fire({
                            icon: 'success',
                            title: 'Login Successful',
                            timer: 2000,
                            showConfirmButton: false
                        }).then(() => {
                            const isComplete = user.is_complete_details === 0;
                            if (user.role_id === 2 && isComplete) {
                                window.location.href = "/multistepform";
                            } else {
                                window.location.href = "/dashboard";
                            }
                        });
                    })
                    .catch(err => {
                        Swal.fire({
                            icon: 'error',
                            title: 'Login Failed',
                            text: err.response?.data?.message || 'Invalid credentials'
                        });
                    });
            });

            /**
             * Handle Registration Form Submission
             */
            registerForm.addEventListener("submit", function(e) {
                e.preventDefault();
                const role = document.getElementById("registerSelectedRole").value;

                // Validate role selection
                if (!role) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Please select a role',
                        text: 'Healthcare or Patient'
                    });
                    return;
                }

                btnRegister.disabled = true;
                btnRegister.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Registering...';
                
                // You can send the registration data with the selected role to your API
                // Example: axios.post('/api/register', { fullName, email, password, role })
            });
        });
    </script>
</body>
</html>
