<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuntiCare\</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/vaccine.css">
    <link rel="shortcut icon" href="../image/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="menu-toggle" id="menuToggle">
                <i class="bi bi-list"></i>
            </button>
            <h4>Vaccine Management</h4>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="dropdown user-dropdown">
                <button class="dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle fs-4"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="../index.html">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar Overlay (mobile only) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <header class="sidebar-header">
            <img src="../image/MuntiCare Logo.png" alt="Logo" class="logo">
            <div class="sidebar-header-text">
                <h5>MuntiCare</h5>
                <small>Health Management</small>
            </div>
        </header>

        <nav class="sidebar-nav">
            <div class="menu-section">
                <p class="menu-label">Main Menu</p>
                <ul class="nav flex-column">
                    <li><a href="overview.html" class="nav-link"><i class="bi bi-house-door"></i> Overview</a></li>
                    <li><a href="inventory.html" class="nav-link"><i class="bi bi-box"></i> Inventory</a></li>
                </ul>
            </div>

            <div class="menu-section">
                <p class="menu-label">Administration</p>
                <ul class="nav flex-column">
                    <li><a href="usermanagement.html" class="nav-link"><i class="bi bi-people"></i> User Management</a></li>
                    <li><a href="feedbacks.html" class="nav-link"><i class="bi bi-chat-left-text"></i> Feedbacks</a></li>
                </ul>
            </div>
        </nav>
    </aside>

    <!-- Main content -->
    <main>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Available Vaccines</h5>
            <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addVaccineModal">
                <i class="bi bi-plus-circle me-1"></i> Add Vaccine
            </button>
        </div>

        <div class="bg-white shadow-sm rounded p-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="vaccineTable">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="vaccineTableBody">
                        <tr>
                            <td colspan="3" class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-wrap" id="paginationWrap"></div>
        </div>
    </main>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Add Vaccine Modal -->
    <div class="modal fade" id="addVaccineModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background-color: #1CDB88; color: white;">
                    <h5 class="modal-title">Add New Vaccine</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addVaccineForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Vaccine Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="vaccineName" required placeholder="e.g., Influenza (Flu) Vaccine">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" id="vaccineDescription" rows="3" placeholder="Description of the vaccine..."></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark">
                                <i class="bi bi-check-circle me-1"></i> Add Vaccine
                            </button>
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Vaccine Modal -->
    <div class="modal fade" id="editVaccineModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background-color: #1CDB88; color: white;">
                    <h5 class="modal-title">Edit Vaccine</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editVaccineForm">
                        <input type="hidden" id="edit_vaccine_id">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Vaccine Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="edit_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" id="edit_description" rows="3"></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark">
                                <i class="bi bi-save me-1"></i> Update Vaccine
                            </button>
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom JS -->
    <script src="../js/vaccine.js"></script>
</body>
</html>
