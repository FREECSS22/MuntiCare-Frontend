<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="shortcut icon" href="../image/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/usermanagement.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <title>MuntiCare</title>
</head>
<body>
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="menu-toggle" id="menuToggle">
                <i class="bi bi-list"></i>
            </button>
            <h4>User Management</h4>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="dropdown user-dropdown">
                <button class="dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle fs-4"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="../settings.html">Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="../auth.html">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar Overlay (mobile only) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <header class="sidebar-header">
            <img src="../image/MuntiCare Logo.png" alt="Logo" class="logo">
            <div class="sidebar-header-text">
                <h5>MuntiCare</h5>
                <small>Health Management</small>
            </div>
        </header>

        <nav class="sidebar-nav">
            <div class="menu-section">
                <p class="menu-label">Main Menu</p>
                <ul class="nav flex-column">
                    <li><a href="overview.html" class="nav-link"><i class="bi bi-house-door"></i> Overview</a></li>
                    <li><a href="inventory.html" class="nav-link"><i class="bi bi-box"></i> Inventory</a></li>
                </ul>
            </div>

            <div class="menu-section">
                <p class="menu-label">Administration</p>
                <ul class="nav flex-column">
                    <li><a href="usermanagement.html" class="nav-link active"><i class="bi bi-people"></i> User Management</a></li>
                    <li><a href="feedbacks.html" class="nav-link"><i class="bi bi-chat-left-text"></i> Feedbacks</a></li>
                </ul>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Search & Filter Section -->
        <div class="search-section">
            <div class="search-section-header">
                <h5>Search for user</h5>
                <button class="btn-add-user" onclick="openAddModal()">
                    <i class="bi bi-plus-lg"></i> Add User
                </button>
            </div>
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Find a User</label>
                    <input type="text" id="searchInput" class="form-control"
                        placeholder="Search by name or email" oninput="applyFilters()" />
                </div>
                <div class="col-md-3">
                    <label class="form-label">Role</label>
                    <select id="filterRole" class="form-select" onchange="applyFilters()">
                        <option value="">All</option>
                        <option value="Admin">Admin</option>
                        <option value="Doctor">Doctor</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Status</label>
                    <select id="filterStatus" class="form-select" onchange="applyFilters()">
                        <option value="">All</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn-search-user" onclick="applyFilters()">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>
            </div>
        </div>

        <!-- User Table Section -->
        <div class="table-section">
            <p class="table-section-title">User Overview</p>
            <div class="table-responsive">
                <table class="table mc-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Created at</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="pagination-wrap" id="paginationWrap"></div>
        </div>

    </main>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p style="font-size:.875rem;font-weight:700;margin-bottom:1rem;color:#212529">User Information</p>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input type="text" id="newName" class="form-control" placeholder="Full name" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" id="newEmail" class="form-control" placeholder="email@example.com" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Password</label>
                            <input type="password" id="newPassword" class="form-control" placeholder="Min. 6 characters" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" id="newPasswordConfirm" class="form-control" placeholder="Repeat password" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Role</label>
                            <select id="newRole" class="form-select">
                                <option value="Admin">Admin</option>
                                <option value="Doctor">Doctor</option>
                            </select>
                        </div>
                    </div>
                    <hr style="margin:1.25rem 0;border-color:#f0f0f0" />
                    <p id="formError" style="color:#dc3545;font-size:.82rem;display:none;margin:0;font-weight:600"></p>
                </div>
                <div class="modal-footer">
                    <button class="btn-modal-cancel" data-bs-dismiss="modal">Close</button>
                    <button class="btn-modal-save" onclick="saveUser()">Save User</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/usermanagement.js"></script>
</body>
</html>
