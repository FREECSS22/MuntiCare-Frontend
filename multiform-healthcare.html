<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuntiCare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/multiform-healthcare.css">
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="image/MuntiCare Logo.png" alt="Logo" style="height:40px; width:40px;">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto"></ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a id="navbarDropdown" class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Account
                        </a>
                        <div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                            <a class="dropdown-item" href="auth.html">Logout</a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container profile-card py-4">
        <div class="text-center">
            <div class="section-header">Complete your staff profile</div>
            <div class="step-indicator">
                <div id="stepCircle1" class="step-circle completed">1</div>
                <div class="step-line"></div>
                <div id="stepCircle2" class="step-circle pending">2</div>
            </div>
        </div>

        <form id="healthcareProfileForm" action="#" method="post" novalidate>
            <div class="form-step active" id="step1">
                <div class="section-header">STAFF INFORMATION</div>
                <div class="section-sub">Fill out the required details</div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="staff_id" class="form-label">Staff ID <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="staff_id" name="staff_id" required placeholder="Enter your staff ID">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="specialization" class="form-label">Specialization <span class="text-danger">*</span></label>
                            <select class="form-select" id="specialization" name="specialization" required>
                                <option value="" disabled selected>Select your specialization</option>
                                <option value="General Practice">General Practice</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="Internal Medicine">Internal Medicine</option>
                                <option value="Surgery">Surgery</option>
                                <option value="Obstetrics and Gynecology">Obstetrics and Gynecology</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="Dermatology">Dermatology</option>
                                <option value="Psychiatry">Psychiatry</option>
                                <option value="Radiology">Radiology</option>
                                <option value="Anesthesiology">Anesthesiology</option>
                                <option value="Emergency Medicine">Emergency Medicine</option>
                                <option value="Nursing">Nursing</option>
                                <option value="Pharmacy">Pharmacy</option>
                                <option value="Laboratory Technician">Laboratory Technician</option>
                                <option value="Medical Imaging">Medical Imaging</option>
                                <option value="Physical Therapy">Physical Therapy</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="first_name" name="first_name" required placeholder="First name">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="middle_name" name="middle_name" placeholder="Middle name (optional)">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="last_name" name="last_name" required placeholder="Last name">
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <button type="button" id="btnStep1" class="btn btn-save" disabled onclick="goToStep(2)">
                        Save & Continue <i class="bi bi-caret-right-fill"></i>
                    </button>
                </div>
            </div>

            <div class="form-step" id="step2">
                <div class="section-header">CREDENTIALS</div>
                <div class="section-sub">Enter professional details</div>

                <div class="row g-4">
                    <div class="col-md-12">
                        <div class="mb-3">
                            <label for="qualification" class="form-label">Qualification <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="qualification" name="qualification" rows="3" required placeholder="Enter your educational qualifications"></textarea>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="license_number" class="form-label">License Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="license_number" name="license_number" required placeholder="Enter your professional license number">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="hire_date" class="form-label">Hire Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="hire_date" name="hire_date" required>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="button" class="btn-back" onclick="goToStep(1)"><i class="bi bi-caret-left-fill"></i> Previous</button>
                    <button type="submit" class="btn btn-save" id="btnStep2" disabled>
                        Submit Details <i class="bi bi-check-circle ms-1"></i>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function goToStep(stepNumber) {
            document.querySelectorAll(".form-step").forEach((step) => step.classList.remove("active"));
            const target = document.getElementById(`step${stepNumber}`);
            if (target) target.classList.add("active");

            for (let i = 1; i <= 2; i += 1) {
                const circle = document.getElementById(`stepCircle${i}`);
                if (!circle) continue;
                circle.className = i <= stepNumber ? "step-circle completed" : "step-circle pending";
            }
        }

        function initStep1Validation() {
            const step1 = document.getElementById("step1");
            const btnStep1 = document.getElementById("btnStep1");
            if (!step1 || !btnStep1) return;

            const requiredFields = step1.querySelectorAll("input[required], select[required]");
            const checkStep1Validity = () => {
                let allFilled = true;
                requiredFields.forEach((field) => {
                    if (!field.value || field.value.trim() === "") allFilled = false;
                });
                btnStep1.disabled = !allFilled;
            };

            requiredFields.forEach((field) => {
                field.addEventListener("input", checkStep1Validity);
                field.addEventListener("change", checkStep1Validity);
            });
            checkStep1Validity();
        }

        function initStep2Validation() {
            const step2 = document.getElementById("step2");
            const btnStep2 = document.getElementById("btnStep2");
            if (!step2 || !btnStep2) return;

            const requiredFields = step2.querySelectorAll("textarea[required], input[required]");
            const checkStep2Validity = () => {
                let allFilled = true;
                requiredFields.forEach((field) => {
                    if (!field.value || field.value.trim() === "") allFilled = false;
                });
                btnStep2.disabled = !allFilled;
            };

            requiredFields.forEach((field) => {
                field.addEventListener("input", checkStep2Validity);
                field.addEventListener("change", checkStep2Validity);
            });
            checkStep2Validity();
        }

        document.addEventListener("DOMContentLoaded", () => {
            goToStep(1);
            initStep1Validation();
            initStep2Validation();
        });
    </script>
    <script src="js/multiform-healthcare.js"></script>
</body>
</html>
