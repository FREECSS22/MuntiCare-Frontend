<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <link rel="shortcut icon" href="../image/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="../css/appointments.css">
    <title>MuntiCare</title>
</head>
<body>
    <nav class="top-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="menu-toggle" id="menuToggle">
                <i class="bi bi-list"></i>
            </button>
            <h4>Appointment Viewer</h4>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="dropdown user-dropdown">
                <button class="dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle fs-4"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="../auth.html">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <header class="sidebar-header">
            <img src="../image/MuntiCare Logo.png" alt="Logo" class="logo">
            <div class="sidebar-header-text">
                <h5>MuntiCare</h5>
                <small>Health Management</small>
            </div>
        </header>

        <nav class="sidebar-nav">
            <div class="menu-section">
                <p class="menu-label">Main Menu</p>
                <ul class="nav flex-column">
                    <li><a href="appointments.html" class="nav-link active"><i class="bi bi-calendar-check"></i>Appointments</a></li>
                    <li><a href="patientmanagement.html" class="nav-link"><i class="bi bi-file-text"></i>Patient Records</a></li>
                </ul>
            </div>
        </nav>
    </aside>

    <main class="page-content">
        <div class="row mb-3">
            <div class="col-md-6">
                <button class="btn btn-success btn-sm send-reminder-btn" onclick="alert('Send reminders feature')">
                    <i class="bi bi-bell me-1"></i> Send Reminder
                </button>
            </div>
            <div class="col-md-6 d-flex justify-content-end">
                <div class="status-card status-legend">
                    <h6>Appointment Status</h6>
                    <ul>
                        <li>
                            <span class="status-dot" style="background: #ffc107;"></span>
                            Pending
                        </li>
                        <li>
                            <span class="status-dot" style="background: #0d6efd;"></span>
                            Confirmed
                        </li>
                        <li>
                            <span class="status-dot" style="background: #198754;"></span>
                            Completed
                        </li>
                        <li>
                            <span class="status-dot" style="background: #dc3545;"></span>
                            Cancelled
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-4">
                <div class="calendar-card">
                    <h6>Calendar</h6>
                    <div id="mini-calendar"></div>
                </div>

                <div class="staff-list-card">
                    <h6>Staff Appointment List</h6>
                    <p class="text-muted">No appointments today</p>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-3">
                        <div id="calendar"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- View Appointment Modal -->
    <div class="modal fade" id="viewAppointmentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header modal-header-green">
                    <h5 class="modal-title">Appointment Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="appointmentDetails"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../js/appointments.js"></script>
</body>
</html>
