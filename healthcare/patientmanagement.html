<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="shortcut icon" href="../image/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/patientmanagement.css">
    <title>MuntiCare</title>
</head>
<body>
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="menu-toggle" id="menuToggle">
                <i class="bi bi-list"></i>
            </button>
            <h4>Patient Records</h4>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="dropdown user-dropdown">
                <button class="dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle fs-4"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="../auth.html">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar Overlay (mobile only) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <header class="sidebar-header">
            <img src="../image/MuntiCare Logo.png" alt="Logo" class="logo">
            <div class="sidebar-header-text">
                <h5>MuntiCare</h5>
                <small>Health Management</small>
            </div>
        </header>

        <nav class="sidebar-nav">
            <div class="menu-section">
                <p class="menu-label">Main Menu</p>
                <ul class="nav flex-column">
                    <li><a href="appointments.html" class="nav-link"><i class="bi bi-calendar-check"></i>Appointments</a></li>
                    <li><a href="patientmanagement.html" class="nav-link active"><i class="bi bi-file-text"></i>Patient Records</a></li>
                </ul>
            </div>
        </nav>
    </aside>

    <main class="page-content">
        <div class="container-fluid py-4">
            <div class="search-section mb-4">
                <form id="patientFiltersForm">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label for="searchPatient" class="form-label">Find a Patient Record</label>
                            <input type="text" id="searchPatient" class="form-control" placeholder="Search by name, email or ID" oninput="applyFilters()">
                        </div>

                        <div class="col-md-3">
                            <label for="appointmentDate" class="form-label">Appointment Date</label>
                            <input type="date" id="appointmentDate" class="form-control" onchange="applyFilters()">
                        </div>

                        <div class="col-md-3">
                            <label for="appointmentTime" class="form-label">Appointment Time</label>
                            <input type="time" id="appointmentTime" class="form-control" onchange="applyFilters()">
                        </div>

                        <div class="col-md-2">
                            <button type="submit" class="btn-search-user">
                                Search
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div id="emptyState" class="text-center py-5 px-4 d-none">
                        <div class="mb-4">
                            <i class="bi bi-inbox empty-icon"></i>
                        </div>
                        <h5 class="text-muted mb-2">No Patients Available</h5>
                        <p id="emptyStateText" class="text-muted mb-0">You don't have any assigned patients yet.</p>
                    </div>

                    <div id="tableWrap" class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Patient Name</th>
                                    <th>Date & Time</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="patientTableBody"></tbody>
                        </table>
                    </div>
                    <div class="px-3 pb-3">
                        <div class="pagination-wrap" id="paginationWrap"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/patientmanagement.js"></script>
</body>
</html>
